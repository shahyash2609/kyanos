# Pod 1: kyanos capture (hostNetwork + hostPID + privileged for eBPF)
# Writes JSONL to /data/kyanos on a hostPath shared with the collector.
apiVersion: v1
kind: Pod
metadata:
  name: kyanos-mcache
  namespace: kyanos
  labels:
    app: kyanos-capture
spec:
  serviceAccountName: default
  nodeSelector:
    kubernetes.io/hostname: gke-k8s-central-stg--np-cntr-xcntr-sp-7bd87fcc-r7h9
  hostPID: true
  hostNetwork: true
  tolerations:
    - operator: Exists
  containers:
    - name: debug
      image: ubuntu:22.04
      command: ["sleep", "infinity"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: sys-kernel
          mountPath: /sys/kernel
        - name: sys-fs-bpf
          mountPath: /sys/fs/bpf
        - name: proc-host
          mountPath: /host/proc
          readOnly: true
        - name: run-containerd
          mountPath: /run/containerd
          readOnly: true
        - name: etc-cni
          mountPath: /etc/cni
          readOnly: true
        - name: shared-data
          mountPath: /data/kyanos
      resources:
        requests:
          cpu: 1m
          memory: 64Mi
        limits:
          cpu: "1"
          memory: 1Gi
  volumes:
    - name: sys-kernel
      hostPath:
        path: /sys/kernel
    - name: sys-fs-bpf
      hostPath:
        path: /sys/fs/bpf
    - name: proc-host
      hostPath:
        path: /proc
    - name: run-containerd
      hostPath:
        path: /run/containerd
    - name: etc-cni
      hostPath:
        path: /etc/cni
    - name: shared-data
      hostPath:
        path: /tmp/kyanos-shared
        type: DirectoryOrCreate
---
# Pod 2: GCS collector (no hostNetwork — Workload Identity works)
# Reads JSONL from the same hostPath and uploads to GCS.
apiVersion: v1
kind: Pod
metadata:
  name: kyanos-collector
  namespace: kyanos
  labels:
    app: kyanos-collector
spec:
  serviceAccountName: gcs-kyanos-ksa
  nodeSelector:
    kubernetes.io/hostname: gke-k8s-central-stg--np-cntr-xcntr-sp-7bd87fcc-r7h9
  tolerations:
    - operator: Exists
  containers:
    - name: collector
      image: google/cloud-sdk:slim
      command:
        - bash
        - -c
        - |
          set -euo pipefail
          GCS_BUCKET="gcs-cntr-xcntr-ebpf-kyanos-stg"
          GCS_PREFIX="stg/mcache-control-plane"
          DATA_DIR="/data/kyanos"
          UPLOAD_INTERVAL=60
          COMPRESS="false"
          STAGING_DIR="${DATA_DIR}/.staging"

          echo "[collector] bucket=${GCS_BUCKET} prefix=${GCS_PREFIX} dir=${DATA_DIR} interval=${UPLOAD_INTERVAL}s compress=${COMPRESS}"
          mkdir -p "${DATA_DIR}" "${STAGING_DIR}"

          while true; do
              find "${DATA_DIR}" -maxdepth 1 -name '*.json' -type f | while read -r filepath; do
                  filename=$(basename "${filepath}")
                  filesize=$(stat -c%s "${filepath}" 2>/dev/null || echo 0)
                  if [ "${filesize}" -lt 1 ]; then
                      continue
                  fi

                  staging_path="${STAGING_DIR}/${filename}"
                  cp "${filepath}" "${staging_path}"
                  truncate -s 0 "${filepath}"

                  pod_name="${filename%.json}"
                  date_prefix=$(date -u +%Y-%m-%d)
                  ts=$(date -u +%Y-%m-%dT%H-%M-%SZ)
                  gcs_path="gs://${GCS_BUCKET}/${GCS_PREFIX}/${pod_name}/${date_prefix}/${ts}.json"

                  upload_size=$(stat -c%s "${staging_path}" 2>/dev/null || echo 0)
                  echo "[collector] uploading ${filename} (${filesize}B) -> ${gcs_path}"
                  if gsutil -q cp "${staging_path}" "${gcs_path}"; then
                      rm -f "${staging_path}"
                      echo "[collector] done: ${pod_name}"
                  else
                      echo "[collector] FAILED: ${staging_path} (kept for retry)"
                  fi
              done

              find "${STAGING_DIR}" -name '*.json' -type f 2>/dev/null | while read -r leftover; do
                  filename=$(basename "${leftover}")
                  pod_name="${filename%.json}"
                  date_prefix=$(date -u +%Y-%m-%d)
                  ts=$(date -u +%Y-%m-%dT%H-%M-%SZ)
                  gcs_path="gs://${GCS_BUCKET}/${GCS_PREFIX}/${pod_name}/${date_prefix}/${ts}-retry.json"
                  echo "[collector] retrying ${leftover} -> ${gcs_path}"
                  if gsutil -q cp "${leftover}" "${gcs_path}"; then
                      rm -f "${leftover}"
                  fi
              done

              sleep "${UPLOAD_INTERVAL}"
          done
      volumeMounts:
        - name: shared-data
          mountPath: /data/kyanos
      resources:
        requests:
          cpu: 1m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi
  volumes:
    - name: shared-data
      hostPath:
        path: /tmp/kyanos-shared
        type: DirectoryOrCreate
