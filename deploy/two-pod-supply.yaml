apiVersion: v1
kind: Namespace
metadata:
  name: kyanos
---
# =============================================================================
# Pod 1: kyanos capture — hostPID + hostNetwork + privileged
# Captures HTTP traffic with Traceparent header, writes per-pod JSONL
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: kyanos-capture-supply
  namespace: kyanos
  labels:
    app: kyanos
    component: capture
spec:
  hostPID: true
  hostNetwork: true
  nodeSelector:
    kubernetes.io/hostname: gke-k8s-supply-stg-a-nap-e2-highmem-1-8c2e02ee-wsdw
  tolerations:
    - operator: Exists
  containers:
    - name: debug
      image: ubuntu:22.04
      command: ["sleep", "infinity"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: sys-kernel
          mountPath: /sys/kernel
        - name: sys-fs-bpf
          mountPath: /sys/fs/bpf
        - name: proc-host
          mountPath: /host/proc
          readOnly: true
        - name: run-containerd
          mountPath: /run/containerd
          readOnly: true
        - name: kyanos-data
          mountPath: /data/kyanos
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
  volumes:
    - name: sys-kernel
      hostPath:
        path: /sys/kernel
    - name: sys-fs-bpf
      hostPath:
        path: /sys/fs/bpf
    - name: proc-host
      hostPath:
        path: /proc
    - name: run-containerd
      hostPath:
        path: /run/containerd
    - name: kyanos-data
      hostPath:
        path: /var/log/kyanos
        type: DirectoryOrCreate
---
# =============================================================================
# Pod 2: collector — reads per-pod JSONL from hostPath
# For now: just monitors the files. GCS upload can be added later.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: kyanos-collector-supply
  namespace: kyanos
  labels:
    app: kyanos
    component: collector
spec:
  nodeSelector:
    kubernetes.io/hostname: gke-k8s-supply-stg-a-nap-e2-highmem-1-8c2e02ee-wsdw
  tolerations:
    - operator: Exists
  containers:
    - name: collector
      image: ubuntu:22.04
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: kyanos-data
          mountPath: /data/kyanos
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
  volumes:
    - name: kyanos-data
      hostPath:
        path: /var/log/kyanos
        type: DirectoryOrCreate
