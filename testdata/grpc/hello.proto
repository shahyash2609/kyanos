syntax = "proto3";

package hello;

// Simple greeter service used to generate gRPC traffic for kyanos testing.
service Greeter {
  // Unary RPC
  rpc SayHello (HelloRequest) returns (HelloReply);
  // Server-streaming RPC
  rpc SayHelloStream (HelloRequest) returns (stream HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
  int32  index   = 2;
}
